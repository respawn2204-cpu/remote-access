name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Install Rust (for cargo metadata only, no compilation)
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch cargo metadata
        run: cargo metadata --format-version 1 > /dev/null

      - name: Download bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          run-id: 28729533826
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: respawn2204-cpu/remote-access

      - name: Download arm64 lib
        uses: actions/download-artifact@v4
        with:
          name: librustdesk.so.aarch64-linux-android
          run-id: 28729533826
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: respawn2204-cpu/remote-access
          path: arm64-libs

      - name: Download armv7 lib
        uses: actions/download-artifact@v4
        with:
          name: librustdesk.so.armv7-linux-androideabi
          run-id: 28729533826
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: respawn2204-cpu/remote-access
          path: armv7-libs

      - name: Place native libs
        run: |
          mkdir -p flutter/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p flutter/android/app/src/main/jniLibs/armeabi-v7a
          cp arm64-libs/*.so flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
          cp armv7-libs/*.so flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so

      - name: Build APK
        run: |
          cd flutter
          flutter pub get
          flutter build apk --release --target-platform android-arm64,android-arm --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: remote-access-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk
          retention-days: 7