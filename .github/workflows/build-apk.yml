name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Install Rust (for cargo metadata only, no compilation)
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch cargo metadata
        run: cargo metadata --format-version 1 > /dev/null

      - name: Build APK
        run: |
          cd flutter
          flutter pub get
          flutter build apk --release --target-platform android-arm64,android-arm --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: remote-access-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk
          retention-days: 7